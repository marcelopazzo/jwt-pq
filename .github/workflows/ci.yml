name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install liboqs (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
          git clone --depth 1 --branch 0.15.0 https://github.com/open-quantum-safe/liboqs
          cd liboqs && mkdir build && cd build
          cmake -GNinja -DBUILD_SHARED_LIBS=ON ..
          ninja && sudo ninja install
          sudo ldconfig

      - name: Install liboqs (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja
          git clone --depth 1 --branch 0.15.0 https://github.com/open-quantum-safe/liboqs
          cd liboqs && mkdir build && cd build
          cmake -GNinja -DBUILD_SHARED_LIBS=ON -DCMAKE_INSTALL_PREFIX=/usr/local ..
          ninja && sudo ninja install

      - uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1.299.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run tests
        run: bundle exec rspec

      - name: Upload coverage to Codecov
        if: matrix.ruby == '3.4' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run RuboCop
        run: bundle exec rubocop
        if: matrix.ruby == '3.4' && matrix.os == 'ubuntu-latest'
