name: Cross-interop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 5"

permissions:
  contents: read

jobs:
  ruby-sign-python-verify:
    name: Ruby signs → Python verifies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Compile vendored liboqs
        run: bundle exec rake compile

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dilithium-py
        run: pip install "dilithium-py==1.4.0"

      - name: Ruby signs
        run: bundle exec ruby spec/interop/ruby_sign.rb interop_out

      - name: Python verifies
        run: python spec/interop/python_verify.py interop_out

  python-sign-ruby-verify:
    name: Python signs → Ruby verifies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Compile vendored liboqs
        run: bundle exec rake compile

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dilithium-py
        run: pip install "dilithium-py==1.4.0"

      - name: Python signs
        run: python spec/interop/python_sign.py interop_out

      - name: Ruby verifies
        run: bundle exec ruby spec/interop/ruby_verify.rb interop_out

  ruby-jwk-python-verify:
    name: Ruby exports JWK + signs → Python parses JWK + verifies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Compile vendored liboqs
        run: bundle exec rake compile

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dilithium-py
        run: pip install "dilithium-py==1.4.0"

      - name: Ruby exports JWK + signs
        run: bundle exec ruby spec/interop/ruby_jwk_sign.rb interop_out

      - name: Python parses JWK + verifies
        run: python spec/interop/python_jwk_verify.py interop_out
