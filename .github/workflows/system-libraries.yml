name: System libraries

on:
  pull_request:
    branches: [main]
    paths:
      - "ext/**"
      - "jwt-pq.gemspec"
      - ".github/workflows/system-libraries.yml"
  schedule:
    - cron: "0 0 * * 5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-system-libraries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install liboqs system-wide
        run: |
          sudo apt-get update && sudo apt-get install -y cmake ninja-build
          git clone --depth 1 --branch 0.16.0 https://github.com/open-quantum-safe/liboqs
          cd liboqs && mkdir build && cd build
          cmake -GNinja -DBUILD_SHARED_LIBS=ON ..
          ninja && sudo ninja install && sudo ldconfig

      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: "3.4"
          bundler-cache: true
        env:
          JWT_PQ_USE_SYSTEM_LIBRARIES: "1"

      - name: Run tests
        run: bundle exec rspec
